{% extends 'webapp/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="bg-light shadow p-5 form-layout">
        <h3>Login your account</h3>
       
        <hr>
        <br>
        <form method="POST" autocomplete="off">
            {% csrf_token %}
            {{form.username|as_crispy_field}}
            <br>
            {{form.password|as_crispy_field}}
            <br>
            <button type="submit" class="btn btn-primary w-100  p-2">Login &nbsp;<i class="fa fa-key" aria-hidden="true"></i></button>
            <br>
            <br>
            <div class="text-center">
                <p>Don't have an account ?</p><a href="{% url 'register' %}">Register</a>
            </div>

        </form>

    </div>
{% endblock %}
